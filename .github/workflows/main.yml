name: Main Kittygram workflow
# Перечень событий-триггеров, при которых должен запускаться workflow
on:
  # Событие push возникает, когда запушен коммит на GitHub
  push:
    # Отлеживаемая ветка
    branches:
      - main
# Список действий, которые выполняются после срабатывания триггера
jobs:
  # Задача первая - проверка проекта тестами
  tests:
    # Разворачиваем окружение для запуска команд (последняя версия Ubuntu)
    runs-on: ubuntu-latest
    # Запускаем контейнер, даём ему доступ к БД для прогона тестов
    services:
      postgres:
        image: postgres:13.10
        # Указываем имя тестовой базы, имя и пароль пользователя в открытом виде,
        # ведь эта база будет работать только во время прогона тестов
        env:
          POSTGRES_USER: kittygram_user
          POSTGRES_PASSWORD: kittygram_password
          POSTGRES_DB: kittygram
        ports:
          - 5432:5432
        # Эта конструкция описывает проверку готовности сервиса postgres
        # Если её не будет, то тесты могут запуститься раньше, чем сервер PostgreSQL
        # В результате тесты опять решат, что базы нет, — и упадут
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
    steps:
    # Описание шагов
    - uses: actions/checkout@v3 # Берём готовое решение из библиотеки GitHub
    # Склонировали текущий коммит репозитория, в котором запущен workflow
    # (kittygram) в текущую рабочую директорию раннера, чтобы раннеру
    # стал доступен исходный код проекта
    # Шаг - установка Python с помощью action
    - name: Set up Python # Назначаем произвольное понятное описание шага
      # Берем готовый action (инсталлик) версии v4 
      uses: actions/setup-python@v4
      # Передаем параметр - нужную версию программы
      with:
        python-version: 3.9
    # Шаг - установить зависимости для выполнения тестов
    - name: Install dependencies
      # Командой в терминале установить pip, утилиты и зависимости
      run: |
        python -m pip install --upgrade pip setuptools
        pip install flake8==6.0.0 flake8-isort==6.0.0
        pip install -r ./backend/requirements.txt 
    # Шаг - открывает доступ к БД для выполнения тестов
    - name: Test with flake8 and django tests
      # Добавляем env-переменные для доступа к БД
      env:
        POSTGRES_USER: kittygram_user
        POSTGRES_PASSWORD: kittygram_password
        POSTGRES_DB: kittygram
        # Сервер БД запущен в Docker, но его порт проброшен на хост
        # Поэтому подключаемся к 127.0.0.1:5432
        DB_HOST: 127.0.0.1
        DB_PORT: 5432
      # Командой в терминале запустить тесты flake8 в папке backend
      run: |
        python -m flake8 backend/
        cd backend/
        python manage.py test
  # Задача вторая - сборка образа бэкенда и оправка на DockerHub
  build_and_push_to_docker_hub:
    name: Push Docker image for backend to DockerHub
    runs-on: ubuntu-latest
    needs: tests
    steps:
      # Шаг - копирование кода проекта
      - name: Check out the repo
        # Получение исходного кода из репозитория
        uses: actions/checkout@v3
      # Шаг - установка Docker Buildx
      - name: Set up Docker Buildx
        # Установка сборщика контейнеров Docker
        uses: docker/setup-buildx-action@v2
      # Шаг - авторизация
      - name: Login to Docker 
        # Авторизация на Docker Hub
        uses: docker/login-action@v2
        # При помощи with передаём в action параметры username и password
        with:
          username: ${{ secrets.DOCKER_USERNAME }} 
          password: ${{ secrets.DOCKER_PASSWORD }}
          # Хорошо ли держать логин и пароль прямо в коде workflow?
          # Нет, это нехорошо
      - name: Push to DockerHub
        # Одновременный билд и пуш образа в Docker Hub
        uses: docker/build-push-action@v4
        with:
          # Параметр context: ./backend/ указывает, что нужный Dockerfile 
          # находится в ./backend/
          context: ./backend/
          # Параметр push: true указывает, что образ нужно не только собрать,
          # но и отправить на Docker Hub
          push: true
          # В параметре tags задаётся название и тег для образа.
          # Для каждого пересобранного образа 
          # устанавливаем тег latest, чтобы потом
          # на сервере и в docker-compose.yml не указывать версию
          tags: ${{ secrets.DOCKER_USERNAME }}/kittygram_backend:latest 
  # Задача третья - тестирование и сборка образа для frontend
  frontend_tests:
    runs-on: ubuntu-latest

    steps:
    # готовый экшн скопирует код
    - uses: actions/checkout@v3
    - name: Set up nodeJS
      # Это готовый воркфлоу для установки Node.js на раннер
      uses: actions/setup-node@v3
      with:
        # Это параметр воркфлоу, указывающий нужную версию Node.js
        node-version: 18

    - name: Install dependencies
      # Эта команда устанавливает зависимости для фронтенда
      run: |
        cd frontend/
        npm ci

    - name: Test frontend
      # Запускаем тесты
      run: |
        cd frontend/
        npm run test
  # Задача четвертая - сборка образа фронтенда и отправка на хаб
  build_frontend_and_push_to_docker_hub:
    name: Push frontend Docker image to DockerHub
    runs-on: ubuntu-latest
    needs: frontend_tests # Выполнять после задачи три - тестирование фронтенда
    steps:
      - name: Check out the repo
        # Получение исходного кода из репозитория
        uses: actions/checkout@v3
      - name: Set up Docker Buildx
        # Установка сборщика контейнеров Docker
        uses: docker/setup-buildx-action@v2
      - name: Login to Docker
        # Авторизация на Docker Hub
        uses: docker/login-action@v2
        # Передаем параметры для авторизации на Docker Hub        
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Push to DockerHub
        # Одновременный билд и пуш образа в Docker Hub
        uses: docker/build-push-action@v4
        with:
          # Где находится исполняющий файл Dockerfile
          context: ./frontend/
          # Параметр push=false - образ собрать, push=true - собрать и отправить 
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/kittygram_frontend:latest
  # Задача пятая - сборка образа с конфигом nginx и отправка на Docker Hub
  build_gateway_and_push_to_docker_hub:
    name: Push gateway Docker image to DockerHub
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      - name: Login to Docker 
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Push to DockerHub
        uses: docker/build-push-action@v4
        with:
          context: ./nginx/
          push: true
          # Тут вместо username должен быть ваш логин на Docker Hub
          tags: ${{ secrets.DOCKER_USERNAME }}/taski_gateway:latest
  # Задача шестая - Деплой на сервер
  deploy:
    runs-on: ubuntu-latest
    needs: 
      # Дождёмся билда всех образов проекта
      - build_and_push_to_docker_hub
      - build_frontend_and_push_to_docker_hub
      - build_gateway_and_push_to_docker_hub
    steps:
      # Запускаем готовый экшн копирования кода в репозиторий
      - name: Checkout repo
        uses: actions/checkout@v3
      # Копируем docker-compose.yml на продакшен-сервер
      - name: Copy docker-compose.yml via ssh
        uses: appleboy/scp-action@master
      # Передаём параметры для action appleboy/scp-action:
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.SSH_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          source: "docker-compose.yml"
          target: "kittygram"
      - name: Executing remote ssh commands to deploy
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.SSH_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          # Параметр script передаёт в action appleboy/ssh-action команды,
          # которые нужно выполнить на сервере, 
          # с которым установлено соединение
          script: |
            cd kittygram
            # Выполняет pull образов с Docker Hub
            sudo docker compose pull
            # Перезапускает все контейнеры в Docker Compose
            sudo docker compose down
            sudo docker compose up -d
            # Выполняет миграции и сбор статики
            sudo docker compose exec backend python manage.py migrate
            sudo docker compose exec backend python manage.py collectstatic
            sudo docker compose exec backend cp -r /app/collected_static/. /backend_static/static/
  # Задача седьмая - отчет об успешном деплое
  send_message:
    runs-on: ubuntu-latest
    needs: deploy
    steps:
    - name: Send message
      uses: appleboy/telegram-action@master
      with:
        to: ${{ secrets.TELEGRAM_TO }}
        token: ${{ secrets.TELEGRAM_TOKEN }}
        message: Деплой kittygram успешно выполнен!
